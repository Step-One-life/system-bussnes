# TriKick — nginx-конфиг для trick.ozma-split.com.
# Кладётся в /etc/nginx/conf.d/. SSL-секцию добавит certbot (--nginx).
#
# backend — Docker-контейнер trikick-backend на 127.0.0.1:8095
# frontend — статика в /home/ozma_split/sites/trick.ozma-split.com/frontend

upstream trikick_backend {
    server 127.0.0.1:8095;
    keepalive 32;
}

server {
    listen 80;
    server_name trick.ozma-split.com;

    access_log /var/log/nginx/trick.access.log;
    error_log /var/log/nginx/trick.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    client_max_body_size 50M;

    # ── Backend API → Docker-контейнер ──
    location /api/ {
        proxy_pass http://trikick_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Frontend — статика SPA ──
    location / {
        root /home/ozma_split/sites/trick.ozma-split.com/frontend;
        index index.html;

        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
